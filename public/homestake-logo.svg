<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" role="img" aria-label="HomeStake Capital">
  <title>HomeStake Capital</title>
  <desc>HomeStake Capital — Building Wealth Through Home Services</desc>

  <!-- Icon: House + Growth Arrow merged -->
  <g transform="translate(60 50)">
    <!-- House body with arrow cutout suggesting growth -->
    <path d="M100 0 L0 70 L50 70 L50 160 L150 160 L150 70 L200 70 Z"
          fill="#16212B"/>
    <!-- Brass arrow overlay / accent -->
    <path d="M70 160 L70 100 L100 100 L100 80 L130 80 L130 100 L160 100 L160 160"
          fill="#B08A47"/>
    <!-- Upward arrow tip on house -->
    <path d="M100 30 L130 70 L70 70 Z"
          fill="#B08A47"/>
    <!-- Ground line -->
    <rect x="0" y="160" width="200" height="6" fill="#B08A47"/>
  </g>

  <!-- Wordmark -->
  <text x="300" y="150"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="96" font-weight="700" letter-spacing="-1"
        fill="#16212B">HomeStake</text>

  <text x="304" y="230"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="32" font-weight="400" letter-spacing="12"
        fill="#B08A47">CAPITAL</text>

  <!-- Tagline -->
  <text x="304" y="290"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="18" font-weight="300" letter-spacing="3"
        fill="#70808F">BUILDING WEALTH THROUGH HOME SERVICES</text>
</svg>
